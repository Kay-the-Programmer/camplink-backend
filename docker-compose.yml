version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: camplink_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-camplink}
      POSTGRES_USER: ${POSTGRES_USER:-camplink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-camplink_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-camplink}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: camplink_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-camplink}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-camplink}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-camplink_secret}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_secret_in_production}
      JWT_EXPIRY_MS: ${JWT_EXPIRY_MS:-604800000}
      UPLOAD_DIR: /data/uploads
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  uploads_data:
