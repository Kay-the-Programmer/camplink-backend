# ── Production profile overrides ─────────────────────────────────────────────
# Activated when SPRING_PROFILES_ACTIVE=prod (set this env var on Render).
# All values here can still be overridden by environment variables.
# ─────────────────────────────────────────────────────────────────────────────

# Never auto-create or alter tables in production — prefer validate once you
# introduce Flyway/Liquibase. Keep 'update' here for the initial launch phase
# while the schema is still being shaped.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Quieter logging in production — bump to DEBUG when investigating issues.
logging.level.com.camplink=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# Seed data is off by default in production; controlled by SEED_DATA env var.
app.seed-data=false
