# ── Server ────────────────────────────────────────────────────────────────────
# Render sets PORT env var; default to 8080 for local/docker-compose usage.
server.port=${PORT:8080}

# ── DataSource ────────────────────────────────────────────────────────────────
# SPRING_DATASOURCE_URL is set by docker-compose.
# On Render, individual DB_* vars are injected via the render.yaml fromDatabase
# references so the nested fallback builds the JDBC URL automatically.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:camplink}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:camplink}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:camplink_secret}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool — sensible defaults for Render Starter containers.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
# REQUIRED in production — must be at least 64 random characters.
jwt.secret=${JWT_SECRET:dev_secret_change_in_production_min_64_chars_padding_here_x}
jwt.expiry-ms=${JWT_EXPIRY_MS:604800000}

# ── File uploads ──────────────────────────────────────────────────────────────
# Default matches the directory created in the Dockerfile.
# On Render, mount a persistent disk at /data/uploads or migrate to S3.
upload.dir=${UPLOAD_DIR:/data/uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS ──────────────────────────────────────────────────────────────────────
# Set ALLOWED_ORIGINS to your Flutter web / PWA origin in production.
# Example: https://camplink.onrender.com,https://camplink.example.com
allowed.origins=${ALLOWED_ORIGINS:*}

# ── Demo data seeding ─────────────────────────────────────────────────────────
# Set SEED_DATA=true only for the first deployment or a dev environment.
# The seeder is a no-op when the database already has users.
app.seed-data=${SEED_DATA:false}

# ── Actuator ──────────────────────────────────────────────────────────────────
# Expose only the health endpoint; Render uses it as a liveness probe.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.camplink=INFO
