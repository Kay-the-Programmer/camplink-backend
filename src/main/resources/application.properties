# DataSource — overridden by docker-compose env vars at runtime
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/camplink}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:camplink}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:camplink_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:dev_secret_change_in_production_min_64_chars_padding_here}
jwt.expiry-ms=${JWT_EXPIRY_MS:604800000}

# File uploads
upload.dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
allowed.origins=${ALLOWED_ORIGINS:*}

# Logging
logging.level.com.camplink=INFO
